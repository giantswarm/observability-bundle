clusterID: ""
managementCluster: ""
organization: ""

userConfig:
  kubePrometheusStack:
    configMap:
      values:
        kube-prometheus-stack:
          defaultRules:
            create: false
          alertmanager:
            enabled: false
          grafana:
            enabled: false
          # kube-state-metrics is now deployed as a standalone app (see the
          # `kubeStateMetrics` app entry and its userConfig below). Disable the
          # copy bundled inside kube-prometheus-stack.
          kubeStateMetrics:
            enabled: false
          prometheus:
            enabled: false
          prometheusOperator:
            admissionWebhooks:
              objectSelector:
                matchExpressions:
                  - key: application.giantswarm.io/prometheus-rule-kind
                    operator: NotIn
                    values:
                      - loki
                  - key: observability.giantswarm.io/rule-type
                    operator: NotIn
                    values:
                      - logs
            networkPolicy:
              flavor: cilium
              matchLabels:
                app.kubernetes.io/instance: kube-prometheus-stack
                app.kubernetes.io/part-of: kube-prometheus-stack
                application.giantswarm.io/team: atlas

  # Config for the standalone kube-state-metrics app (extracted from
  # kube-prometheus-stack). The CRS custom resources and rbac extraRules are
  # injected on top of this via the `ksm.customResources` helper.
  kubeStateMetrics:
    configMap:
      values:
        kube-state-metrics:
          networkPolicy:
            flavor: cilium
          rbac:
            # Kept here so the ksm.customResources helper concatenates it with the
            # custom-resource-state rules (the helper replaces the chart default).
            extraRules:
            - apiGroups: ["autoscaling.k8s.io"]
              resources:
                - verticalpodautoscalers
              verbs: ["list", "watch"]
          prometheus:
            monitor:
              # chart 7.x reads relabelings from the per-endpoint `http` block first,
              # so the full list must live here (it overrides the app default).
              http:
                metricRelabelings:
                  # GS addition to reduce cardinality
                  # drop unused kube-state-metrics metrics with the highest cardinality as they increase Prometheus memory usage
                  - sourceLabels: [__name__]
                    regex: kube_(.+_annotations|secret_type|pod_status_qos_class|pod_tolerations|pod_status_scheduled|replicaset_metadata_generation|replicaset_status_observed_generation|replicaset_annotations|replicaset_status_fully_labeled_replicas|.+_metadata_resource_version)
                    action: drop
                  # drop image_id label
                  - action: labeldrop
                    regex: image_id
                  # GS addition for dashboards
                  - sourceLabels: [label_topology_kubernetes_io_region]
                    targetLabel: region
                    replacement: ${1}
                    action: replace
                  - sourceLabels: [label_topology_kubernetes_io_zone]
                    targetLabel: zone
                    replacement: ${1}
                    action: replace
                  - action: labeldrop
                    regex: label_topology_kubernetes_io_region|label_topology_kubernetes_io_zone
                  # Override with label for AWS clusters if exists.
                  - sourceLabels: [label_giantswarm_io_machine_deployment]
                    targetLabel: nodepool
                    replacement: ${1}
                    action: replace
                  # Override with label for Azure clusters if exists.
                  - sourceLabels: [label_giantswarm_io_machine_pool]
                    targetLabel: nodepool
                    replacement: ${1}
                    action: replace
                  # CAPI monitoring specific BEGIN
                  # (see kube-state-metrics rules in https://github.com/giantswarm/observability-bundle/tree/main/helm/observability-bundle/ksm-configurations)
                  - action: replace
                    sourceLabels:
                      - __name__
                      - cluster_name
                    regex: "^capi_.+;(.+)"
                    replacement: "${1}"
                    targetLabel: cluster_id
                  # Use the `name` label as cluster name if the above fails
                  - action: replace
                    sourceLabels:
                      - __name__
                      - cluster_name
                      - name
                    regex: "^capi_.+;;(.+)"
                    replacement: "${1}"
                    targetLabel: cluster_id
                  # CAPI monitoring specific END
                  # Set cluster_type for CAPI cluster metrics based on whether the cluster is the management cluster
                  - sourceLabels: [__name__]
                    regex: "capi_cluster_.+"
                    targetLabel: cluster_type
                    replacement: workload_cluster
                  - sourceLabels: [__name__, cluster_id]
                    regex: "capi_cluster_.+;{{ $.Values.managementCluster }}"
                    targetLabel: cluster_type
                    replacement: management_cluster

apps:
  alloyEvents:
    appName: alloy-events
    chartName: alloy
    catalog: default
    dependsOn:
      - prometheus-operator-crd
      - kyverno-crds
    enabled: true
    namespace: kube-system
    # used by renovate
    # repo: giantswarm/alloy-app
    version: 0.20.1
    # a list of extraConfigs for the App,
    # It can be secret or configmap
    # https://github.com/giantswarm/rfc/tree/main/multi-layer-app-config#example
    extraConfigs:
      - kind: secret
        name: "{{ $.Values.clusterID }}-events-logger-secret"
        namespace: "{{ $.Release.Namespace }}"
      - kind: configMap
        name: "{{ $.Values.clusterID }}-events-logger-config"
        namespace: "{{ $.Release.Namespace }}"

  alloyLogs:
    appName: alloy-logs
    chartName: alloy
    catalog: default
    dependsOn:
      - prometheus-operator-crd
      - kyverno-crds
    enabled: true
    namespace: kube-system
    # used by renovate
    # repo: giantswarm/alloy-app
    version: 0.20.1
    # a list of extraConfigs for the App,
    # It can be secret or configmap
    # https://github.com/giantswarm/rfc/tree/main/multi-layer-app-config#example
    extraConfigs:
      - kind: secret
        name: "{{ $.Values.clusterID }}-logging-secret"
        namespace: "{{ $.Release.Namespace }}"
      - kind: configMap
        name: "{{ $.Values.clusterID }}-logging-config"
        namespace: "{{ $.Release.Namespace }}"

  alloyPodLogsCrds:
    appName: alloy-podlogs-crds
    chartName: alloy-podlogs-crds
    catalog: default
    enabled: true
    namespace: kube-system
    # used by renovate
    # repo: giantswarm/alloy-app
    version: 0.20.1

  alloyMetrics:
    appName: alloy-metrics
    chartName: alloy
    catalog: default
    dependsOn:
      - prometheus-operator-crd
      - kyverno-crds
    enabled: true
    namespace: kube-system
    # used by renovate
    # repo: giantswarm/alloy-app
    version: 0.20.1
    # a list of extraConfigs for the App,
    # It can be secret or configmap
    # https://github.com/giantswarm/rfc/tree/main/multi-layer-app-config#example
    extraConfigs:
      - kind: secret
        name: "{{ $.Values.clusterID }}-monitoring-secret"
        namespace: "{{ $.Release.Namespace }}"
      - kind: configMap
        name: "{{ $.Values.clusterID }}-monitoring-config"
        namespace: "{{ $.Release.Namespace }}"

  prometheusOperatorCrd:
    appName: prometheus-operator-crd
    chartName: prometheus-operator-crd
    catalog: default
    enabled: true
    namespace: kube-system
    # used by renovate
    # repo: giantswarm/prometheus-operator-crd
    version: 21.0.0
    extraConfigs: []

  kubePrometheusStack:
    appName: kube-prometheus-stack
    chartName: kube-prometheus-stack
    catalog: default
    dependsOn:
      - prometheus-operator-crd
    enabled: true
    namespace: kube-system
    skipCRDs: true
    timeout: 15m
    # used by renovate
    # repo: giantswarm/kube-prometheus-stack-app
    version: 21.0.0
    extraConfigs: []

  kubeStateMetrics:
    appName: kube-state-metrics
    chartName: kube-state-metrics
    catalog: default
    dependsOn:
      - prometheus-operator-crd
    enabled: true
    namespace: kube-system
    # used by renovate
    # repo: giantswarm/kube-state-metrics-app
    version: 0.2.0
    extraConfigs: []
